# Mass transit-alert worker — predicts ISS/HST/CSS Sun+Moon transits for every
# confirmed subscriber (Supabase) and sends the 24–48 h heads-up via Pushover.
# Announce-only: cron jitter of minutes is irrelevant at this lead time.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, PUSHOVER_APP_TOKEN,
#   ALERTS_HMAC_SECRET
# The job exits quietly when they are unset (forks, not-yet-configured repos).

name: transit-alerts

on:
  schedule:
    - cron: '17 */8 * * *'      # 3×/day; off-the-hour to dodge cron congestion
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Predict + log only, send nothing'
        type: boolean
        default: false

concurrency:
  group: transit-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install runtime deps
        run: npm ci --omit=dev

      - name: Run alert worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          ALERTS_HMAC_SECRET: ${{ secrets.ALERTS_HMAC_SECRET }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::notice::alert secrets not configured — skipping"
            exit 0
          fi
          node alerts/notify.js
